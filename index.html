<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trig Identities Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#ffffff;
  --surface:#f4f7fb;
  --border:#c8d8f0;
  --border-strong:#2a5fac;
  --txt:#0a1628;
  --txt2:#2a4a7a;
  --blue:#1a4fa0;
  --blue-light:#e6eefa;
  --green:#127a2e;
  --green-bg:#e8f7ec;
  --green-border:#38a858;
  --red:#b51c1c;
  --red-bg:#fde8e8;
  --red-border:#d94040;
  --pink:#c0186a;
  --pink-bg:#fce8f2;
  --pink-border:#e060a8;
  --yellow:#7a5a00;
  --yellow-bg:#fffbe6;
  --yellow-border:#d4a800;
  --radius:8px;
  --mono:'JetBrains Mono',monospace;
  --serif:'Source Serif 4',Georgia,serif;
}

html,body{
  font-family:var(--serif);
  background:var(--bg);
  color:var(--txt);
  height:100%;
  overflow-x:hidden;
}

/* â”€â”€ PAGE SHELL: flex column, full viewport â”€â”€ */
.page{
  display:flex;
  flex-direction:column;
  min-height:100vh;
  max-width:640px;
  margin:0 auto;
}

/* â”€â”€ TOP: progress bar only â”€â”€ */
.prog-bar-wrap{height:4px;background:var(--border);width:100%;flex-shrink:0;}
.prog-bar{height:4px;background:var(--blue);transition:width .3s ease;}

/* â”€â”€ QUIZ AREA (grows to fill space) â”€â”€ */
.quiz-area{
  flex:1;
  padding:14px 16px 8px;
  display:flex;
  flex-direction:column;
}

/* question meta */
.qmeta{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.qnum{font-family:var(--mono);font-size:.7rem;color:var(--txt2);letter-spacing:.06em;}
.qcat{font-size:.7rem;background:var(--blue-light);color:var(--blue);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-weight:600;}
.score-inline{font-family:var(--mono);font-size:.7rem;color:var(--txt2);margin-left:auto;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:2px 8px;}

/* stem */
.qstem{font-size:1rem;line-height:1.6;color:var(--txt);margin-bottom:12px;}
.multi-hint{font-size:.75rem;color:var(--blue);background:var(--blue-light);border:1px solid var(--border);border-radius:5px;padding:5px 10px;margin-bottom:10px;font-weight:600;}

/* options */
.options{display:flex;flex-direction:column;gap:7px;margin-bottom:8px;}
.opt{display:flex;align-items:flex-start;gap:11px;border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 13px;cursor:pointer;transition:border-color .12s,background .12s;user-select:none;-webkit-tap-highlight-color:transparent;}
.opt:active:not(.done){background:var(--blue-light);}
.opt.selected:not(.done){border-color:var(--border-strong);background:var(--blue-light);}
.opt-letter{flex-shrink:0;width:24px;height:24px;border-radius:5px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:.72rem;font-weight:500;color:var(--txt2);transition:all .12s;}
.opt-text{font-size:.9rem;line-height:1.5;color:var(--txt);padding-top:2px;}

/* revealed states */
.opt.correct-ans{border-color:var(--green-border)!important;background:var(--green-bg)!important;}
.opt.correct-ans .opt-letter{border-color:var(--green-border);background:var(--green-border);color:#fff;}
.opt.correct-ans .opt-text{color:var(--green);}
.opt.valid-other{border-color:var(--border-strong)!important;background:var(--blue-light)!important;}
.opt.valid-other .opt-letter{border-color:var(--border-strong);background:var(--blue);color:#fff;}
.opt.valid-other .opt-text{color:var(--blue);}
.opt.invalid-other{border-color:var(--yellow-border)!important;background:var(--yellow-bg)!important;}
.opt.invalid-other .opt-letter{border-color:var(--yellow-border);background:var(--yellow-border);color:#fff;}
.opt.invalid-other .opt-text{color:var(--yellow);}
.opt.user-wrong-valid{border-color:var(--pink-border)!important;background:var(--pink-bg)!important;}
.opt.user-wrong-valid .opt-letter{border-color:var(--pink-border);background:var(--pink-border);color:#fff;}
.opt.user-wrong-valid .opt-text{color:var(--pink);}
.opt.user-wrong-invalid{border-color:var(--red-border)!important;background:var(--red-bg)!important;}
.opt.user-wrong-invalid .opt-letter{border-color:var(--red-border);background:var(--red-border);color:#fff;}
.opt.user-wrong-invalid .opt-text{color:var(--red);}

/* result badge */
.result-badge{font-size:.82rem;font-weight:600;padding:7px 12px;border-radius:var(--radius);margin-bottom:8px;display:none;}
.result-badge.show{display:block;}
.result-badge.correct{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.result-badge.incorrect{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.result-badge.partial{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-border);}

/* â”€â”€ NAV â”€â”€ */
.nav{display:flex;gap:8px;align-items:center;padding:8px 0 6px;}
.btn{font-family:var(--serif);font-size:.88rem;padding:9px 18px;border-radius:var(--radius);cursor:pointer;border:1.5px solid;transition:all .12s;font-weight:600;-webkit-tap-highlight-color:transparent;}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn-primary:active{background:#0d3478;}
.btn-secondary{background:#fff;color:var(--blue);border-color:var(--border-strong);}
.btn-secondary:active{background:var(--blue-light);}
.btn:disabled{opacity:.38;cursor:default;}
.nav-count{font-family:var(--mono);font-size:.72rem;color:var(--txt2);margin-left:auto;}

/* â”€â”€ COLOR KEY â”€â”€ */
.color-key{display:flex;flex-wrap:wrap;gap:8px 14px;padding:8px 0 10px;}
.ck{display:flex;align-items:center;gap:5px;font-size:.72rem;}
.ck-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* â”€â”€ DIVIDER â”€â”€ */
.divider{height:1px;background:var(--border);margin:0 -16px;}

/* â”€â”€ BOTTOM PANEL â”€â”€ */
.bottom-panel{flex-shrink:0;background:var(--surface);border-top:1.5px solid var(--border);padding:10px 16px 12px;}

/* category strip */
.cat-strip{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.cat-btn{font-family:var(--serif);font-size:.72rem;padding:4px 11px;border:1.5px solid var(--border-strong);border-radius:20px;background:white;color:var(--blue);cursor:pointer;transition:all .12s;-webkit-tap-highlight-color:transparent;}
.cat-btn.active,.cat-btn:active{background:var(--blue);color:white;border-color:var(--blue);}

/* header at very bottom */
.bottom-header{text-align:center;padding-top:6px;border-top:1px solid var(--border);}
.bottom-header h1{font-size:.88rem;font-weight:600;color:var(--txt2);}
.bottom-header p{font-size:.72rem;color:#7a96c0;margin-top:2px;}

/* summary */
.summary{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;}
.summary h2{font-size:1.5rem;color:var(--blue);margin-bottom:12px;}
.final-score{font-family:var(--mono);font-size:3rem;font-weight:500;color:var(--blue);margin:12px 0;}
.summary p{color:var(--txt2);font-size:.95rem;margin-bottom:6px;line-height:1.5;}

.hidden{display:none!important;}
</style>
</head>
<body>
<div class="page">

  <!-- TOP: progress only -->
  <div class="prog-bar-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>

  <!-- QUIZ CONTENT -->
  <div class="quiz-area" id="quizArea"></div>

  <!-- SUMMARY (hidden until done) -->
  <div class="summary hidden" id="summaryArea"></div>

  <!-- BOTTOM PANEL: nav + key + categories + title -->
  <div class="bottom-panel" id="bottomPanel">

    <!-- result badge lives here when revealed -->
    <div class="result-badge" id="resultBadge"></div>

    <!-- nav buttons -->
    <div class="nav" id="navRow">
      <button class="btn btn-secondary" id="prevBtn" onclick="prevQ()" disabled>&#8592; Prev</button>
      <button class="btn btn-primary" id="submitBtn" onclick="submitMulti()" style="display:none">Submit</button>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQ()" style="display:none">Next &#8594;</button>
      <span class="nav-count" id="navCount"></span>
    </div>

    <!-- color key -->
    <div class="color-key">
      <div class="ck"><div class="ck-dot" style="background:var(--green-border)"></div><span style="color:var(--green)">Correct answer</span></div>
      <div class="ck"><div class="ck-dot" style="background:var(--blue)"></div><span style="color:var(--blue)">Valid identity</span></div>
      <div class="ck"><div class="ck-dot" style="background:var(--yellow-border)"></div><span style="color:var(--yellow)">Invalid identity</span></div>
      <div class="ck"><div class="ck-dot" style="background:var(--pink-border)"></div><span style="color:var(--pink)">Your pick (valid, wrong)</span></div>
      <div class="ck"><div class="ck-dot" style="background:var(--red-border)"></div><span style="color:var(--red)">Your pick (invalid)</span></div>
    </div>

    <div class="divider"></div>

    <!-- category filter -->
    <div style="padding-top:10px;">
      <div style="font-size:.68rem;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;">Category</div>
      <div class="cat-strip">
        <button class="cat-btn active" onclick="setCategory('All')">All</button>
        <button class="cat-btn" onclick="setCategory('Pythagorean')">Pythagorean</button>
        <button class="cat-btn" onclick="setCategory('Double Angle')">Double Angle</button>
        <button class="cat-btn" onclick="setCategory('Power Reducing')">Power Reducing</button>
        <button class="cat-btn" onclick="setCategory('Product to Sum')">Product to Sum</button>
        <button class="cat-btn" onclick="setCategory('Reciprocal & Quotient')">Reciprocal</button>
        <button class="cat-btn" onclick="setCategory('Half Angle')">Half Angle</button>
        <button class="cat-btn" onclick="setCategory('Integral Results')">Integrals</button>
        <button class="cat-btn" onclick="setCategory('Trig Substitution')">Trig Sub</button>
        <button class="cat-btn" onclick="setCategory('Mixed')">Mixed</button>
      </div>
    </div>

    <!-- title at very bottom -->
    <div class="bottom-header">
      <h1>Trigonometric Identities</h1>
      <p>Integral Calculus &mdash; 200 Questions</p>
    </div>

  </div>
</div>

<script>
const ALL_Q = [{"q": "Which expression equals $\\sin(a+b) - \\sin(a-b)$?", "opts": [{"t": "$2\\cos a \\sin b$", "c": true, "v": true}, {"t": "$2\\sin a \\sin b$", "c": false, "v": false}, {"t": "$\\sin(a+b)$", "c": false, "v": false}, {"t": "$2\\sin a \\cos b$", "c": false, "v": true}, {"t": "$2\\cos a \\cos b$", "c": false, "v": true}], "multi": false, "cat": "Product to Sum"}, {"q": "$\\int \\dfrac{dx}{1+x^2}$ equals?", "opts": [{"t": "$\\dfrac{1}{2}\\ln(1+x^2)+C$", "c": false, "v": true}, {"t": "$\\dfrac{-1}{(1+x^2)^2}+C$", "c": false, "v": false}, {"t": "$\\arctan x + C$", "c": true, "v": true}, {"t": "$\\ln|1+x^2|+C$", "c": false, "v": false}], "multi": false, "cat": "Trig Substitution"}, {"q": "$\\cos^2\\dfrac{b}{2}$ equals which expression?", "opts": [{"t": "$\\dfrac{1 - \\cos b}{2}$", "c": false, "v": true}, {"t": "$1 + \\cos b$", "c": false, "v": false}, {"t": "$\\dfrac{1 + \\cos b}{2}$", "c": true, "v": true}, {"t": "$\\dfrac{\\cos b + 1}{4}$", "c": false, "v": false}], "multi": false, "cat": "Half Angle"}, {"q": "Which expression equals $\\dfrac{\\tan x + \\tan y}{1 - \\tan x \\tan y}$?", "opts": [{"t": "$\\sin(x+y)/\\cos(x+y)$", "c": false, "v": true}, {"t": "$\\tan(x+y)$", "c": true, "v": true}, {"t": "$\\cot(x+y)$", "c": false, "v": true}, {"t": "$\\tan(xy)$", "c": false, "v": false}, {"t": "$\\tan(x-y)$", "c": false, "v": true}], "multi": false, "cat": "Mixed"}, {"q": "$\\int \\sec^2 x\\, dx = ?$", "opts": [{"t": "$\\sec x \\tan x + C$", "c": false, "v": true}, {"t": "$-\\cot x + C$", "c": false, "v": true}, {"t": "$\\sec x + C$", "c": false, "v": true}, {"t": "$\\tan x + C$", "c": true, "v": true}, {"t": "$2\\sec x \\tan x + C$", "c": false, "v": false}], "multi": false, "cat": "Integral Results"}, {"q": "$\\int \\sin(2x)\\, dx = ?$", "opts": [{"t": "$\\dfrac{\\sin(2x)}{2} + C$", "c": false, "v": false}, {"t": "$\\dfrac{\\cos(2x)}{2} + C$", "c": false, "v": false}, {"t": "$-\\dfrac{\\sin(2x)}{2} + C$", "c": false, "v": false}, {"t": "$2\\cos(2x) + C$", "c": false, "v": false}, {"t": "$-\\dfrac{\\cos(2x)}{2} + C$", "c": true, "v": true}], "multi": false, "cat": "Integral Results"}, {"q": "Which rearrangement of $1 + \\tan^2 x = \\sec^2 x$ is correct?", "opts": [{"t": "$\\tan^2 x = \\sec^2 x - 1$", "c": true, "v": true}, {"t": "$\\tan^2 x = 1 - \\sec^2 x$", "c": false, "v": false}, {"t": "$\\csc^2 x - \\cot^2 x = 1$", "c": false, "v": true}, {"t": "$\\sec^2 x = 1 - \\tan^2 x$", "c": false, "v": false}], "multi": false, "cat": "Pythagorean"}, {"q": "$1 - \\sin^2 u$ simplifies to which of the following?", "opts": [{"t": "$-\\cos^2 u$", "c": false, "v": false}, {"t": "$\\sin^2 u$", "c": false, "v": true}, {"t": "$\\cos^2 u$", "c": true, "v": true}, {"t": "$1 + \\cos^2 u$", "c": false, "v": false}, {"t": "$2\\cos^2 u$", "c": false, "v": false}], "multi": false, "cat": "Pythagorean"}, {"q": "From $\\sin A \\cos B = \\frac{1}{2}[\\sin(A+B)+\\sin(A-B)]$, which rearrangement is correct?", "opts": [{"t": "$\\sin(A+B) - \\sin(A-B) = 2\\sin A \\cos B$", "c": false, "v": false}, {"t": "$\\sin A \\cos B = \\sin(A+B) + \\sin(A-B)$", "c": false, "v": false}, {"t": "$2\\sin A \\cos B - \\sin(A+B) = \\sin(A-B)$", "c": true, "v": true}, {"t": "$2\\sin A \\cos B = \\sin(A-B) - \\sin(A+B)$", "c": false, "v": false}], "multi": false, "cat": "Product to Sum"}, {"q": "Which expression equals $4\\sin u \\cos u$?", "opts": [{"t": "$\\sin(2u)$", "c": false, "v": true}, {"t": "$2\\cos^2 u - 1$", "c": false, "v": true}, {"t": "$\\cos(2u)$", "c": false, "v": true}, {"t": "$4\\cos(2u)$", "c": false, "v": false}, {"t": "$2\\sin(2u)$", "c": true, "v": true}], "multi": false, "cat": "Double Angle"}, {"q": "The substitution $x = \\sin\\theta$ is used because it exploits which identity?", "opts": [{"t": "$1 + \\tan^2\\theta = \\sec^2\\theta$", "c": false, "v": true}, {"t": "$\\sin(2\\theta) = 2\\sin\\theta\\cos\\theta$", "c": false, "v": true}, {"t": "$1 - \\sin^2\\theta = \\cos^2\\theta$", "c": true, "v": true}, {"t": "$\\sin^2\\theta + \\cos^2\\ let filtered=[], currentIdx=0, score=0, answered=0;
let selected=new Set(), revealed=false, currentCat='All';

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function setCategory(cat){
  currentCat=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>{
    b.classList.toggle('active', b.textContent.trim()===cat||(cat==='All'&&b.textContent.trim()==='All'));
  });
  filtered=cat==='All'?[...ALL_Q]:ALL_Q.filter(q=>q.cat===cat);
  shuffle(filtered);
  currentIdx=0;score=0;answered=0;
  document.getElementById('summaryArea').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  render();
}

function render(){
  if(!filtered.length){document.getElementById('quizArea').innerHTML='<p style="color:var(--txt2);padding:20px;">No questions in this category.</p>';return;}
  if(currentIdx>=filtered.length){showSummary();return;}
  const q=filtered[currentIdx];
  selected=new Set();revealed=false;

  // progress
  document.getElementById('progBar').style.width=Math.round((currentIdx/filtered.length)*100)+'%';

  // result badge reset
  const rb=document.getElementById('resultBadge');
  rb.className='result-badge';rb.textContent='';

  // nav buttons
  document.getElementById('prevBtn').disabled=(currentIdx===0);
  const submitBtn=document.getElementById('submitBtn');
  const nextBtn=document.getElementById('nextBtn');
  submitBtn.style.display=q.multi?'inline-block':'none';
  nextBtn.style.display='none';
  document.getElementById('navCount').textContent=(currentIdx+1)+' / '+filtered.length;

  const letters='ABCDE';
  let optsHTML=q.opts.map((o,i)=>`
    <div class="opt" id="opt${i}" onclick="selectOpt(${i})">
      <div class="opt-letter">${letters[i]}</div>
      <div class="opt-text">${o.t}</div>
    </div>`).join('');

  let multiHint=q.multi?`<div class="multi-hint">&#9745; Select ALL correct answers, then tap Submit</div>`:'';

  document.getElementById('quizArea').innerHTML=`
    <div class="qmeta">
      <span class="qnum">Q${currentIdx+1}</span>
      <span class="qcat">${q.cat}</span>
      <span class="score-inline">Score: ${score}/${answered}</span>
    </div>
    <div class="qstem">${q.q}</div>
    ${multiHint}
    <div class="options">${optsHTML}</div>`;

  renderMath();
}

function renderMath(){
  if(window.renderMathInElement){
    renderMathInElement(document.getElementById('quizArea'),{
      delimiters:[{left:'$',right:'$',display:false},{left:'$$',right:'$$',display:true}],
      throwOnError:false
    });
  }
}

function selectOpt(i){
  if(revealed)return;
  const q=filtered[currentIdx];
  if(q.multi){
    const el=document.getElementById('opt'+i);
    if(selected.has(i)){selected.delete(i);el.classList.remove('selected');}
    else{selected.add(i);el.classList.add('selected');}
  } else {
    selected.add(i);
    revealAnswers();
  }
}

function submitMulti(){
  if(revealed||selected.size===0)return;
  revealAnswers();
}

function revealAnswers(){
  if(revealed)return;
  revealed=true;answered++;
  const q=filtered[currentIdx];
  const opts=q.opts;
  const correctSet=new Set(opts.map((o,i)=>o.c?i:-1).filter(i=>i>=0));
  const isCorrect=q.multi
    ?([...correctSet].every(i=>selected.has(i))&&[...selected].every(i=>correctSet.has(i)))
    :(selected.size===1&&correctSet.has([...selected][0]));
  if(isCorrect)score++;

  opts.forEach((o,i)=>{
    const el=document.getElementById('opt'+i);
    el.onclick=null;el.classList.remove('selected');el.style.cursor='default';
    if(o.c){el.classList.add('correct-ans');}
    else if(selected.has(i)){el.classList.add(o.v?'user-wrong-valid':'user-wrong-invalid');}
    else{el.classList.add(o.v?'valid-other':'invalid-other');}
  });

  const rb=document.getElementById('resultBadge');
  if(q.multi){
    if(isCorrect){rb.className='result-badge show correct';rb.textContent='Correct â€” all right answers selected.';}
    else if([...selected].some(i=>correctSet.has(i))){rb.className='result-badge show partial';rb.textContent='Partial â€” not all correct answers selected.';}
    else{rb.className='result-badge show incorrect';rb.textContent='Incorrect.';}
  } else {
    if(isCorrect){rb.className='result-badge show correct';rb.textContent='Correct!';}
    else{rb.className='result-badge show incorrect';rb.textContent='Incorrect â€” correct answer shown in green.';}
  }

  document.getElementById('submitBtn').style.display='none';
  document.getElementById('nextBtn').style.display='inline-block';
  document.getElementById('nextBtn').textContent=currentIdx===filtered.length-1?'Finish':'Next \u2192';
  document.getElementById('navCount').textContent=(currentIdx+1)+' / '+filtered.length+'  \u2022  Score: '+score+'/'+answered;
}

function nextQ(){currentIdx++;render();}
function prevQ(){if(currentIdx>0){currentIdx--;render();}}

function showSummary(){
  document.getElementById('quizArea').classList.add('hidden');
  document.getElementById('progBar').style.width='100%';
  const pct=Math.round((score/answered)*100);
  const msg=pct>=90?'Outstanding.':pct>=70?'Good â€” review the ones you missed.':pct>=50?'Keep practising.':'Review the identity list and try again.';
  const sa=document.getElementById('summaryArea');
  sa.classList.remove('hidden');
  sa.innerHTML=`<h2>Quiz Complete</h2>
    <div class="final-score">${score}<span style="font-size:1.4rem;opacity:.5"> / ${answered}</span></div>
    <p>${pct}% correct</p><p style="margin-top:6px;">${msg}</p>
    <button class="btn btn-primary" onclick="setCategory(currentCat)" style="margin-top:20px;">Restart</button>`;
  document.getElementById('resultBadge').className='result-badge';
  document.getElementById('submitBtn').style.display='none';
  document.getElementById('nextBtn').style.display='none';
}

document.addEventListener('DOMContentLoaded',()=>setCategory('All'));
</script>
</body>
</html>
