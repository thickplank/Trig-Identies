<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trig Identities Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,600;1,8..60,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#ffffff;
  --surface:#f4f7fb;
  --border:#c8d8f0;
  --border-strong:#2a5fac;
  --txt:#0a1628;
  --txt2:#2a4a7a;
  --blue:#1a4fa0;
  --blue-light:#e6eefa;
  --green:#127a2e;
  --green-bg:#e8f7ec;
  --green-border:#38a858;
  --red:#b51c1c;
  --red-bg:#fde8e8;
  --red-border:#d94040;
  --pink:#c0186a;
  --pink-bg:#fce8f2;
  --pink-border:#e060a8;
  --yellow:#7a5a00;
  --yellow-bg:#fffbe6;
  --yellow-border:#d4a800;
  --radius:8px;
}
body{font-family:'Source Serif 4',Georgia,serif;background:var(--bg);color:var(--txt);min-height:100vh;padding:0;}

/* HEADER */
.header{background:var(--blue);color:#fff;padding:22px 32px 18px;border-bottom:3px solid #0d3478;}
.header h1{font-size:1.55rem;font-weight:600;letter-spacing:.01em;}
.header-sub{font-size:.85rem;opacity:.82;margin-top:4px;font-weight:300;}

/* CONTROLS BAR */
.controls{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 32px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.cat-label{font-size:.8rem;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;}
.cat-btn{font-family:'Source Serif 4',serif;font-size:.8rem;padding:5px 13px;border:1.5px solid var(--border-strong);border-radius:20px;background:white;color:var(--blue);cursor:pointer;transition:all .15s;}
.cat-btn:hover,.cat-btn.active{background:var(--blue);color:white;border-color:var(--blue);}
.spacer{flex:1;}
.progress-wrap{display:flex;align-items:center;gap:10px;}
.score-badge{font-family:'JetBrains Mono',monospace;font-size:.82rem;color:var(--txt2);background:var(--blue-light);border:1px solid var(--border);border-radius:6px;padding:3px 10px;}

/* PROGRESS BAR */
.prog-bar-wrap{height:4px;background:var(--border);width:100%;}
.prog-bar{height:4px;background:var(--blue);transition:width .3s ease;}

/* MAIN LAYOUT */
.main{max-width:820px;margin:0 auto;padding:32px 24px 80px;}

/* QUESTION CARD */
.qcard{background:#fff;border:1.5px solid var(--border);border-radius:12px;box-shadow:0 2px 12px rgba(26,79,160,.06);padding:32px;}
.qnum{font-family:'JetBrains Mono',monospace;font-size:.73rem;color:var(--txt2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.qcat{display:inline-block;font-size:.73rem;background:var(--blue-light);color:var(--blue);border:1px solid var(--border);border-radius:4px;padding:2px 8px;margin-bottom:14px;font-weight:600;}
.qstem{font-size:1.08rem;line-height:1.7;color:var(--txt);margin-bottom:24px;}
.multi-hint{font-size:.78rem;color:var(--blue);background:var(--blue-light);border:1px solid var(--border);border-radius:5px;padding:6px 12px;margin-bottom:16px;font-weight:600;}

/* OPTIONS */
.options{display:flex;flex-direction:column;gap:10px;}
.opt{display:flex;align-items:flex-start;gap:14px;border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:border-color .15s,background .15s;user-select:none;}
.opt:hover:not(.done){border-color:var(--border-strong);background:var(--blue-light);}
.opt.selected:not(.done){border-color:var(--border-strong);background:var(--blue-light);}
.opt-letter{flex-shrink:0;width:26px;height:26px;border-radius:6px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:500;color:var(--txt2);transition:all .15s;}
.opt-text{font-size:.95rem;line-height:1.6;color:var(--txt);padding-top:1px;}

/* done states */
.opt.correct-ans{border-color:var(--green-border)!important;background:var(--green-bg)!important;}
.opt.correct-ans .opt-letter{border-color:var(--green-border);background:var(--green-border);color:#fff;}
.opt.correct-ans .opt-text{color:var(--green);}

.opt.valid-other{border-color:var(--border-strong)!important;background:var(--blue-light)!important;}
.opt.valid-other .opt-letter{border-color:var(--border-strong);background:var(--blue);color:#fff;}
.opt.valid-other .opt-text{color:var(--blue);}

.opt.invalid-other{border-color:var(--yellow-border)!important;background:var(--yellow-bg)!important;}
.opt.invalid-other .opt-letter{border-color:var(--yellow-border);background:var(--yellow-border);color:#fff;}
.opt.invalid-other .opt-text{color:var(--yellow);}

.opt.user-wrong-valid{border-color:var(--pink-border)!important;background:var(--pink-bg)!important;}
.opt.user-wrong-valid .opt-letter{border-color:var(--pink-border);background:var(--pink-border);color:#fff;}
.opt.user-wrong-valid .opt-text{color:var(--pink);}

.opt.user-wrong-invalid{border-color:var(--red-border)!important;background:var(--red-bg)!important;}
.opt.user-wrong-invalid .opt-letter{border-color:var(--red-border);background:var(--red-border);color:#fff;}
.opt.user-wrong-invalid .opt-text{color:var(--red);}

/* result badge */
.result-badge{margin-top:18px;padding:10px 16px;border-radius:var(--radius);font-size:.88rem;font-weight:600;display:none;}
.result-badge.show{display:block;}
.result-badge.correct{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.result-badge.incorrect{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.result-badge.partial{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-border);}

/* COLOR KEY */
.color-key{margin-top:18px;display:flex;flex-wrap:wrap;gap:10px;font-size:.75rem;}
.ck{display:flex;align-items:center;gap:5px;}
.ck-dot{width:10px;height:10px;border-radius:50%;}

/* NAV BUTTONS */
.nav{display:flex;gap:12px;margin-top:28px;align-items:center;}
.btn{font-family:'Source Serif 4',serif;font-size:.9rem;padding:10px 24px;border-radius:var(--radius);cursor:pointer;border:1.5px solid;transition:all .15s;font-weight:600;}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn-primary:hover{background:#0d3478;border-color:#0d3478;}
.btn-secondary{background:#fff;color:var(--blue);border-color:var(--border-strong);}
.btn-secondary:hover{background:var(--blue-light);}
.btn:disabled{opacity:.4;cursor:default;}
.qcount{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--txt2);margin-left:auto;}

/* SUMMARY */
.summary{text-align:center;padding:48px 24px;}
.summary h2{font-size:1.8rem;color:var(--blue);margin-bottom:16px;}
.summary .final-score{font-family:'JetBrains Mono',monospace;font-size:3.5rem;font-weight:500;color:var(--blue);margin:20px 0;}
.summary p{color:var(--txt2);font-size:1rem;margin-bottom:8px;}
.summary .btn{margin-top:24px;}

.hidden{display:none!important;}
</style>
</head>
<body>

<div class="header">
  <h1>Trigonometric Identities</h1>
  <div class="header-sub">Integral Calculus &mdash; Identity Quiz &mdash; 200 Questions</div>
</div>

<div class="controls">
  <span class="cat-label">Category:</span>
  <button class="cat-btn active" onclick="setCategory('All')">All</button>
  <button class="cat-btn" onclick="setCategory('Pythagorean')">Pythagorean</button>
  <button class="cat-btn" onclick="setCategory('Double Angle')">Double Angle</button>
  <button class="cat-btn" onclick="setCategory('Power Reducing')">Power Reducing</button>
  <button class="cat-btn" onclick="setCategory('Product to Sum')">Product to Sum</button>
  <button class="cat-btn" onclick="setCategory('Reciprocal & Quotient')">Reciprocal</button>
  <button class="cat-btn" onclick="setCategory('Half Angle')">Half Angle</button>
  <button class="cat-btn" onclick="setCategory('Integral Results')">Integrals</button>
  <button class="cat-btn" onclick="setCategory('Trig Substitution')">Trig Sub</button>
  <button class="cat-btn" onclick="setCategory('Mixed')">Mixed</button>
  <span class="spacer"></span>
  <span class="score-badge" id="scoreBadge">Score: 0 / 0</span>
</div>

<div class="prog-bar-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>

<div class="main">
  <div id="quizArea"></div>
  <div id="summaryArea" class="summary hidden"></div>
</div>

<script>
const ALL_Q = [{"q": "Which expression equals $\\sin(a+b) - \\sin(a-b)$?", "opts": [{"t": "$2\\cos a \\sin b$", "c": true, "v": true}, {"t": "$2\\sin a \\sin b$", "c": false, "v": false}, {"t": "$\\sin(a+b)$", "c": false, "v": false}, {"t": "$2\\sin a \\cos b$", "c": false, "v": true}, {"t": "$2\\cos a \\cos b$", "c": false, "v": true}], "multi": false, "cat": "Product to Sum"}, {"q": "$\\int \\dfrac{dx}{1+x^2}$ equals?", "opts": [{"t": "$\\dfrac{1}{2}\\ln(1+x^2)+C$", "c": false, "v": true}, {"t": "$\\dfrac{-1}{(1+x^2)^2}+C$", "c": false, "v": false}, {"t": "$\\arctan x + C$", "c": true, "v": true}, {"t": "$\\ln|1+x^2|+C$", "c": false, "v": false}], "multi": false, "cat": "Trig Substitution"}, {"q": "$\\cos^2\\dfrac{b}{2}$ equals which expression?", "opts": [{"t": "$\\dfrac{1 - \\cos b}{2}$", "c": false, "v": true}, {"t": "$1 + \\cos b$", "c": false, "v": false}, {"t": "$\\dfrac{1 + \\cos b}{2}$", "c": true, "v": true}, {"t": "$\\dfrac{\\cos b + 1}{4}$", "c": false, "v": false}], "multi": false, "cat": "Half Angle"}, {"q": "Which expression equals $\\dfrac{\\tan x + \\tan y}{1 - \\tan x \\tan y}$?", "opts": [{"t": "$\\sin(x+y)/\\cos(x+y)$", "c": false, "v": true}, {"t": "$\\tan(x+y)$", "c": true, "v": true}, {"t": "$\\cot(x+y)$", "c": false, "v": true}, {"t": "$\\tan(xy)$", "c": false, "v": false}, {"t": "$\\tan(x-y)$", "c": false, "v": true}], "multi": false, "cat": "Mixed"}, {"q": "$\\int \\sec^2 x\\, dx = ?$", "opts": [{"t": "$\\sec x \\tan x + C$", "c": false, "v": true}, {"t": "$-\\cot x + C$", "c": false, "v": true}, {"t": "$\\sec x + C$", "c": false, "v": true}, {"t": "$\\tan x + C$", "c": true, "v": true}, {"t": "$2\\sec x \\tan x + C$", "c": false, "v": false}], "multi": false, "cat": "Integral Results"}, {"q": "$\\int \\sin(2x)\\, dx = ?$", "opts": [{"t": "$\\dfrac{\\sin(2x)}{2} + C$", "c": false, "v": false}, {"t": "$\\dfrac{\\cos(2x)}{2} + C$", "c": false, "v": false}, {"t": "$-\\dfrac{\\sin(2x)}{2} + C$", "c": false, "v": false}, {"t": "$2\\cos(2x) + C$", "c": false, "v": false}, {"t": "$-\\dfrac{\\cos(2x)}{2} + C$", "c": true, "v": true}], "multi": false, "cat": "Integral Results"}, {"q": "Which rearrangement of $1 + \\tan^2 x = \\sec^2 x$ is correct?", "opts": [{"t": "$\\tan^2 x = \\sec^2 x - 1$", "c": true, "v": true}, {"t": "$\\tan^2 x = 1 - \\sec^2 x$", "c": false, "v": false}, {"t": "$\\csc^2 x - \\cot^2 x = 1$", "c": false, "v": true}, {"t": "$\\sec^2 x = 1 - \\tan^2 x$", "c": false, "v": false}], "multi": false, "cat": "Pythagorean"}, {"q": "$1 - \\sin^2 u$ simplifies to which of the following?", "opts": [{"t": "$-\\cos^2 u$", "c": false, "v": false}, {"t": "$\\sin^2 u$", "c": false, "v": true}, {"t": "$\\cos^2 u$", "c": true, "v": true}, {"t": "$1 + \\cos^2 u$", "c": false, "v": false}, {"t": "$2\\cos^2 u$", "c": false, "v": false}], "multi": false, "cat": "Pythagorean"}, {"q": "From $\\sin A \\cos B = \\frac{1}{2}[\\sin(A+B)+\\sin(A-B)]$, which rearrangement is correct?", "opts": [{"t": "$\\sin(A+B) - \\sin(A-B) = 2\\sin A \\cos B$", "c": false, "v": false}, {"t": "$\\sin A \\cos B = \\sin(A+B) + \\sin(A-B)$", "c": false, "v": false}, {"t": "$2\\sin A \\cos B - \\sin(A+B) = \\sin(A-B)$", "c": true, "v": true}, {"t": "$2\\sin A \\cos B = \\sin(A-B) - \\sin(A+B)$", "c": false, "v": false}], "multi": false, "cat": "Product to Sum"}, {"q": "Which expression equals $4\\sin u \\cos u$?", "opts": [{"t": "$\\sin(2u)$", "c": false, "v": true}, {"t": "$2\\cos^2 u - 1$", "c": false, "v": true}, {"t": "$\\cos(2u)$", "c": false, "v": true}, {"t": "$4\\cos(2u)$", "c": false, "v": false}, {"t": "$2\\sin(2u)$", "c": true, "v": true}], "multi": false, "cat": "Double Angle"}, {"q": "The substitution $x = \\sin\\theta$ is used because it exploits which identity?", "opts": [{"t": "$1 + \\tan^2\\theta = \\sec^2\\theta$", "c": false, "v": true}, {"t": "$\\sin(2\\theta) = 2\\sin\\theta\\cos\\theta$", "c": false, "v": true}, {"t": "$1 - \\sin^2\\theta = \\cos^2\\theta$", "c": true, "v": true}, {"t": "$\\sin^2\\theta + \\cos^2\\theta = 2$", "c": false, "v": false}, {"t": "$\\sec^2\\theta - 1 = \\tan^2\\theta$", "c": false, "v": true}], "multi": false, "cat": "Trig Substitution"}, {"q": "Which expression equals $\\cos(A-B) - \\cos(A+B)$?", "opts": [{"t": "$2\\cos A \\sin B$", "c": false, "v": false}, {"t": "$2\\cos A \\cos B$", "c": false, "v": true}, {"t": "$2\\sin A \\sin B$", "c": true, "v": true}, {"t": "$\\sin(A-B)$", "c": false, "v": true}], "multi": false, "cat": "Product to Sum"}, {"q": "$\\int \\sin x \\cos x\\, dx$ \u2014 which substitution is most direct?", "opts": [{"t": "Let $u = \\cos x$, so $du = -\\sin x\\, dx$, giving $-\\dfrac{\\cos^2 x}{2} + C$", "c": false, "v": true}, {"t": "Use power-reducing: $\\sin x \\cos x = \\dfrac{1-\\cos(2x)}{2}$", "c": false, "v": false}, {"t": "Use $\\sin x \\cos x = \\dfrac{\\sin(2x)}{2}$, giving $-\\dfrac{\\cos(2x)}{4} + C$", "c": false, "v": true}, {"t": "Let $u = \\sin x$, so $du = \\cos x\\, dx$, giving $\\int u\\, du = \\dfrac{\\sin^2 x}{2} + C$", "c": true, "v": true}], "multi": false, "cat": "Integral Results"}, {"q": "Given $\\sin A \\cos B = \\frac{1}{2}[\\sin(A+B)+\\sin(A-B)]$, what does $\\sin(3x)\\cos(x)$ equal?", "opts": [{"t": "$\\dfrac{1}{2}[\\cos(2x) - \\cos(4x)]$", "c": false, "v": true}, {"t": "$\\dfrac{1}{2}[\\sin(4x) - \\sin(2x)]$", "c": false, "v": false}, {"t": "$\\sin(4x) + \\sin(2x)$", "c": false, "v": false}, {"t": "$\\dfrac{1}{2}[\\cos(4x) + \\cos(2x)]$", "c": false, "v": false}, {"t": "$\\dfrac{1}{2}[\\sin(4x) + \\sin(2x)]$", "c": true, "v": true}], "multi": false, "cat": "Product to Sum"}, {"q": "Which identity best simplifies $\\dfrac{\\sin(2x)}{1+\\cos(2x)}$?", "opts": [{"t": "$2\\sin x$", "c": false, "v": false}, {"t": "$\\cot x$", "c": false, "v": true}, {"t": "$\\tan x$", "c": true, "v": true}, {"t": "$\\sin x$", "c": false, "v": true}, {"t": "$2\\tan x$", "c": false, "v": false}], "multi": false, "cat": "Mixed"}, {"q": "Which expression equals $\\dfrac{\\sin^2 x + \\cos^2 x}{\\sin^2 x}$?", "opts": [{"t": "$\\ let filtered = [];
let currentIdx = 0;
let score = 0;
let answered = 0;
let selected = new Set();
let revealed = false;
let currentCat = 'All';

function setCategory(cat){
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>{
    b.classList.toggle('active', b.textContent.trim()===cat || (cat==='All'&&b.textContent.trim()==='All'));
  });
  filtered = cat==='All' ? [...ALL_Q] : ALL_Q.filter(q=>q.cat===cat);
  shuffle(filtered);
  currentIdx=0; score=0; answered=0;
  document.getElementById('summaryArea').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  render();
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function render(){
  if(!filtered.length){
    document.getElementById('quizArea').innerHTML='<p style="color:var(--txt2);padding:32px;">No questions in this category.</p>';
    return;
  }
  if(currentIdx>=filtered.length){showSummary();return;}
  const q = filtered[currentIdx];
  selected = new Set();
  revealed = false;
  const letters = 'ABCDE';
  const pct = Math.round((currentIdx/filtered.length)*100);
  document.getElementById('progBar').style.width=pct+'%';
  document.getElementById('scoreBadge').textContent=`Score: ${score} / ${answered}`;

  let optsHTML = q.opts.map((o,i)=>`
    <div class="opt" id="opt${i}" onclick="selectOpt(${i})" data-idx="${i}">
      <div class="opt-letter">${letters[i]}</div>
      <div class="opt-text" id="opttext${i}">${o.t}</div>
    </div>`).join('');

  let multiHint = q.multi ? `<div class="multi-hint">&#9745; Select ALL correct answers, then click Submit</div>`:'';
  let submitBtn = q.multi ? `<div class="nav" id="submitRow"><button class="btn btn-primary" id="submitBtn" onclick="submitMulti()">Submit</button></div>`:'';

  document.getElementById('quizArea').innerHTML = `
    <div class="qcard">
      <div class="qnum">Question ${currentIdx+1} of ${filtered.length}</div>
      <div class="qcat">${q.cat}</div>
      <div class="qstem" id="qstem">${q.q}</div>
      ${multiHint}
      <div class="options" id="opts">${optsHTML}</div>
      ${submitBtn}
      <div class="result-badge" id="resultBadge"></div>
      <div class="color-key">
        <div class="ck"><div class="ck-dot" style="background:var(--green-border)"></div><span style="color:var(--green)">Correct answer</span></div>
        <div class="ck"><div class="ck-dot" style="background:var(--blue)"></div><span style="color:var(--blue)">Valid identity</span></div>
        <div class="ck"><div class="ck-dot" style="background:var(--yellow-border)"></div><span style="color:var(--yellow)">Invalid identity</span></div>
        <div class="ck"><div class="ck-dot" style="background:var(--pink-border)"></div><span style="color:var(--pink)">Your selection (valid, wrong)</span></div>
        <div class="ck"><div class="ck-dot" style="background:var(--red-border)"></div><span style="color:var(--red)">Your selection (invalid)</span></div>
      </div>
    </div>
    <div class="nav" id="navRow" style="display:none;">
      <button class="btn btn-secondary" onclick="prevQ()" ${currentIdx===0?'disabled':''}>&#8592; Previous</button>
      <button class="btn btn-primary" onclick="nextQ()" id="nextBtn">${currentIdx===filtered.length-1?'Finish':'Next &#8594;'}</button>
      <span class="qcount">${currentIdx+1} / ${filtered.length}</span>
    </div>`;
  
  renderMath();
}

function renderMath(){
  if(window.renderMathInElement){
    renderMathInElement(document.getElementById('quizArea'),{
      delimiters:[{left:'$',right:'$',display:false},{left:'$$',right:'$$',display:true}],
      throwOnError:false
    });
  }
}

function selectOpt(i){
  if(revealed) return;
  const q = filtered[currentIdx];
  if(q.multi){
    const el = document.getElementById('opt'+i);
    if(selected.has(i)){selected.delete(i);el.classList.remove('selected');}
    else{selected.add(i);el.classList.add('selected');}
  } else {
    // single select: reveal immediately
    selected.add(i);
    revealAnswers();
  }
}

function submitMulti(){
  if(revealed||selected.size===0) return;
  revealAnswers();
}

function revealAnswers(){
  if(revealed) return;
  revealed = true;
  answered++;
  const q = filtered[currentIdx];
  const opts = q.opts;
  
  // Determine if correct
  const correctSet = new Set(opts.map((o,i)=>o.c?i:-1).filter(i=>i>=0));
  const isCorrect = q.multi
    ? ([...correctSet].every(i=>selected.has(i)) && [...selected].every(i=>correctSet.has(i)))
    : (selected.size===1 && correctSet.has([...selected][0]));
  
  if(isCorrect) score++;

  opts.forEach((o,i)=>{
    const el = document.getElementById('opt'+i);
    el.onclick=null;
    el.classList.remove('selected');
    el.style.cursor='default';
    
    if(o.c){
      el.classList.add('correct-ans');
    } else if(selected.has(i)){
      // user selected wrong
      if(o.v) el.classList.add('user-wrong-valid');
      else el.classList.add('user-wrong-invalid');
    } else {
      if(o.v) el.classList.add('valid-other');
      else el.classList.add('invalid-other');
    }
  });

  const badge = document.getElementById('resultBadge');
  if(q.multi){
    if(isCorrect){badge.className='result-badge show correct';badge.textContent='Correct — all right answers selected.';}
    else if([...selected].some(i=>correctSet.has(i))){badge.className='result-badge show partial';badge.textContent='Partially correct — not all right answers selected.';}
    else{badge.className='result-badge show incorrect';badge.textContent='Incorrect.';}
  } else {
    if(isCorrect){badge.className='result-badge show correct';badge.textContent='Correct!';}
    else{badge.className='result-badge show incorrect';badge.textContent='Incorrect — the correct answer is shown in green.';}
  }

  const submitRow = document.getElementById('submitRow');
  if(submitRow) submitRow.style.display='none';
  
  document.getElementById('scoreBadge').textContent=`Score: ${score} / ${answered}`;
  const nav = document.getElementById('navRow');
  if(nav) nav.style.display='flex';
}

function nextQ(){
  currentIdx++;
  render();
}

function prevQ(){
  if(currentIdx>0){currentIdx--;render();}
}

function showSummary(){
  document.getElementById('quizArea').classList.add('hidden');
  document.getElementById('progBar').style.width='100%';
  const pct = Math.round((score/answered)*100);
  document.getElementById('summaryArea').classList.remove('hidden');
  document.getElementById('summaryArea').innerHTML=`
    <h2>Quiz Complete</h2>
    <div class="final-score">${score}<span style="font-size:1.5rem;opacity:.5"> / ${answered}</span></div>
    <p>${pct}% correct</p>
    <p style="margin-top:8px;">${pct>=90?'Outstanding work.':pct>=70?'Good — review the identities you missed.':pct>=50?'Keep practising — these patterns become familiar with repetition.':'Review the identity list and try again.'}</p>
    <button class="btn btn-primary" onclick="setCategory(currentCat)" style="margin-top:24px;">Restart</button>
  `;
}

// Initial load
document.addEventListener('DOMContentLoaded', ()=>{
  setCategory('All');
});

document.addEventListener('DOMContentLoaded', ()=>{
  setTimeout(()=>{
    if(window.renderMathInElement) renderMath();
  }, 300);
});
</script>

<script>
document.addEventListener("DOMContentLoaded", function() {
  renderMathInElement(document.body, {
    delimiters: [
      {left:"$", right:"$", display:false},
      {left:"$$", right:"$$", display:true}
    ],
    throwOnError: false
  });
});
</script>
</body>
